<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidad 4</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:'Montserrat',sans-serif;
            background:#0d1117;
            color:white;
        }

        .hero-section{
            position:relative;
            width:100%;
            min-height:100vh;
            background:url('javi.png') center center / cover no-repeat;
            display:flex;
            flex-direction:column;
            align-items:center;
        }

        .overlay{
            position:absolute;
            width:100%;
            height:100%;
            background:rgba(13,17,23,.85);
        }

        .content-wrapper{
            position:relative;
            z-index:2;
            width:100%;
            display:flex;
            flex-direction:column;
            align-items:center;
        }

        .header-container{
            text-align:center;
            margin-top:10vh;
            max-width:900px;
            padding:20px;
        }

        .header-container h1{
            font-size:3.5rem;
        }

        .subtitle{
            font-size:1.4rem;
            color:#ddd;
        }

        .intro-text{
            line-height:1.6;
            text-align:justify;
            color:#e1e7ed;
        }

        .evidencias-container{
            display:flex;
            gap:60px;
            flex-wrap:wrap;
            justify-content:center;
            margin-top:40px;
        }

        .evidencia-btn{
            display:flex;
            align-items:center;
            gap:20px;
            background:none;
            border:none;
            color:white;
            cursor:pointer;
            padding:12px 24px;
        }

        .gear-icon{
            width:70px;
            height:70px;
            fill:#e08739;
        }

        .pdf-viewer-container{
            display:none;
            width:90%;
            margin-top:50px;
        }

        iframe{
            width:100%;
            height:650px;
            border:none;
            border-radius:10px;
            background:white;
        }

        .btn-back{
            margin:60px 0;
            padding:12px 28px;
            background:#30363d;
            color:white;
            text-decoration:none;
            border-radius:6px;
        }

    </style>
</head>

<body>

<div class="hero-section">

    <div class="overlay"></div>

    <div class="content-wrapper">

        <div class="header-container">

            <h1>UNIDAD 4</h1>

            <p class="subtitle">
                Protección y Lubricación
            </p>

            <p class="intro-text">
                En esta unidad estudié la lubricación y protección de superficies para prolongar la vida útil de equipos industriales.
            </p>

        </div>

        <div class="evidencias-container">

            <button class="evidencia-btn"
            onclick="verPdf('T4_Ev10.pdf')">

                <svg class="gear-icon" viewBox="0 0 24 24">
                    <path d="M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
                </svg>

                <span>T4 Ev10</span>

            </button>

            <button class="evidencia-btn"
            onclick="verPdf('T4_Ev11.pdf')">

                <svg class="gear-icon" viewBox="0 0 24 24">
                    <path d="M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
                </svg>

                <span>T4 Ev11</span>

            </button>

        </div>

        <div id="pdfContainer" class="pdf-viewer-container">

            <iframe id="pdfIframe"></iframe>

        </div>

        <a href="index.html" class="btn-back">
            ← Volver al Índice
        </a>

    </div>

</div>

<script>

function verPdf(rutaPdf){

    const contenedor =
        document.getElementById('pdfContainer');

    const iframe =
        document.getElementById('pdfIframe');

    iframe.src = rutaPdf;

    contenedor.style.display='block';

    contenedor.scrollIntoView({
        behavior:'smooth'
    });
}

</script>

</body>
</html>
