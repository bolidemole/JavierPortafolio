
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidad 3 - Evidencias</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            background-color: #0d1117;
        }

        .hero-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background: url('javi.png') center center / cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-bottom: 50px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.85);
            z-index: 1;
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .header-container {
            text-align: center;
            margin-top: 10vh;
            margin-bottom: 8vh;
            width: 100%;
            padding: 0 20px;
        }

        .header-container h1 {
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: #dddddd;
        }

        .intro-text {
            font-size: 1.05rem;
            line-height: 1.6;
            text-align: justify;
            max-width: 700px;
            margin: 0 auto;
            color: #e1e7ed;
        }

        .evidencias-container {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .evidencia-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            padding: 12px 24px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .evidencia-btn:hover {
            transform: scale(1.05);
            background-color: rgba(255,255,255,0.05);
        }

        .gear-icon {
            width: 70px;
            height: 70px;
            fill: #e08739;
            transition: transform 0.8s ease;
        }

        .evidencia-btn:hover .gear-icon {
            transform: rotate(90deg);
        }

        .evidencia-texto {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .pdf-viewer-container {
            display: none;
            width: 90%;
            max-width: 950px;
            background-color: #161b22;
            border-radius: 12px;
            padding: 15px;
            margin-top: 50px;
        }

        iframe {
            width: 100%;
            height: 650px;
            border: none;
            border-radius: 6px;
            background-color: white;
        }

        .btn-back {
            margin-top: 60px;
            padding: 12px 28px;
            background-color: rgba(33,38,45,0.8);
            color: white;
            border-radius: 6px;
            text-decoration: none;
        }

    </style>
</head>

<body>

<div class="hero-section">

    <div class="overlay"></div>

    <div class="content-wrapper">

        <div class="header-container">

            <h1>UNIDAD 3</h1>

            <p class="subtitle">
                Herramientas de Mantenimiento
            </p>

            <p class="intro-text">
                Durante esta unidad tuve la oportunidad de conocer y estudiar las diferentes herramientas utilizadas en mantenimiento industrial.
            </p>

        </div>

        <div class="evidencias-container">

            <button class="evidencia-btn"
            onclick="verPdf('T3_Ev7_AM_Mapas_Didacticos.pdf','T3 Ev7')">

                <svg class="gear-icon" viewBox="0 0 24 24">
                    <path d="M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
                </svg>

                <span class="evidencia-texto">T3 Ev7</span>

            </button>

            <button class="evidencia-btn"
            onclick="verPdf('T3_Ev08_AM_Exposicion.pdf','T3 Ev08')">

                <svg class="gear-icon" viewBox="0 0 24 24">
                    <path d="M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
                </svg>

                <span class="evidencia-texto">T3 Ev08</span>

            </button>

        </div>

        <div id="pdfContainer" class="pdf-viewer-container">

            <iframe id="pdfIframe"></iframe>

        </div>

        <a href="index.html" class="btn-back">
            ← Volver al Índice
        </a>

    </div>

</div>

<script>

function verPdf(rutaPdf) {

    const contenedor =
        document.getElementById('pdfContainer');

    const iframe =
        document.getElementById('pdfIframe');

    iframe.src = rutaPdf;

    contenedor.style.display = 'block';

    contenedor.scrollIntoView({
        behavior: 'smooth'
    });
}

</script>

</body>
</html>
